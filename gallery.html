<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINEX | Gallery Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #050505;
            color: white;
            font-family: 'Montserrat', sans-serif;
            padding: 80px 5% 50px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(35px, 8vw, 60px);
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        header p {
            opacity: 0.5;
            letter-spacing: 4px;
            font-size: 10px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* نظام الشبكة */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            grid-auto-rows: 500px;
            grid-gap: 30px;
            grid-auto-flow: dense;
        }

        /* الحركات الاحترافية (Reveal Animation) */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 2px;
            opacity: 0; /* مخفية في البداية */
            transform: translateY(50px); /* نازلة للأسفل قليلاً */
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* الكلاس الذي يضيفه الجافاسكريبت عند التمرير */
        .gallery-item.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-item.wide { grid-column: span 2; }
        .gallery-item.tall { grid-row: span 2; }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s cubic-bezier(0.2, 1, 0.3, 1);
            filter: brightness(0.8);
        }

        .gallery-item:hover img {
            transform: scale(1.1);
            filter: brightness(1);
        }

        .overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent 50%);
            display: flex;
            align-items: flex-end;
            padding: 40px;
            opacity: 0;
            transition: 0.5s;
        }

        .gallery-item:hover .overlay { opacity: 1; }

        .overlay span {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-left: 1px solid #fff;
            padding-left: 15px;
        }

        .back-nav {
            margin-top: 100px;
            text-align: center;
        }

        .back-btn {
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .back-btn:hover { color: white; letter-spacing: 6px; }

        @media (max-width: 768px) {
            .gallery-item.wide { grid-column: span 1; }
            .gallery-grid { grid-auto-rows: 400px; }
        }
    </style>
</head>
<body>

    <header>
        <p>Curated Works</p>
        <h1>ZINEX ARCHIVE</h1>
        <p>By Amine OV</p>
    </header>

    <div class="gallery-grid">
        <div class="gallery-item wide">
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=2070" alt="Classic">
            <div class="overlay"><span>Automotive Cinema</span></div>
        </div>

        <div class="gallery-item tall">
            <img src="https://images.unsplash.com/photo-1614612160205-7354679244f7?q=80&w=1974" alt="Old Money">
            <div class="overlay"><span>Editorial Portrait</span></div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=2070" alt="City">
            <div class="overlay"><span>Urban Nightscape</span></div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1583337130417-3346a1be7dee?q=80&w=1964" alt="Details">
            <div class="overlay"><span>Luxury Textures</span></div>
        </div>

        <div class="gallery-item wide">
            <img src="https://images.unsplash.com/photo-1493238792040-d710475a6d38?q=80&w=2070" alt="Motion">
            <div class="overlay"><span>Midnight Drive</span></div>
        </div>

        <div class="gallery-item tall">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=1974" alt="Style">
            <div class="overlay"><span>Modern Aesthetic</span></div>
        </div>
    </div>

    <div class="back-nav">
        <a href="index.html" class="back-btn">← Home</a>
    </div>

    <script>
        // كود الجافاسكريبت المسؤول عن حركة الظهور عند التمرير
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.gallery-item').forEach(item => {
            observer.observe(item);
        });
    </script>
</body>
</html>
