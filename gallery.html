<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINEX | Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Montserrat', sans-serif;
            padding: 50px 5%;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 50px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        header p {
            opacity: 0.6;
            letter-spacing: 2px;
            font-size: 14px;
        }

        /* نظام الشبكة الفاخرة */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 400px;
            grid-gap: 20px;
            grid-auto-flow: dense; /* يجعل الصور تملأ الفراغات تلقائياً */
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            cursor: pointer;
        }

        /* جعل بعض الصور تأخذ مساحة أكبر (عرضياً أو طولياً) */
        .gallery-item.wide { grid-column: span 2; }
        .gallery-item.tall { grid-row: span 2; }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* تأثير الظل عند التمرير */
        .gallery-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            transition: 0.3s;
        }

        .gallery-item:hover::after { opacity: 1; }

        .back-btn {
            display: inline-block;
            margin-top: 40px;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid white;
            padding-bottom: 5px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header>
        <p>AMINE OV PRESENTS</p>
        <h1>ZINEX GALLERY</h1>
    </header>

    <div class="gallery-grid">
        <div class="gallery-item tall">
            <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1974&auto=format&fit=crop" alt="Cinema 1">
        </div>

        <div class="gallery-item wide">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=2071&auto=format&fit=crop" alt="Cinema 2">
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=2070&auto=format&fit=crop" alt="Cinema 3">
        </div>

        <div class="gallery-item tall">
            <img src="https://images.unsplash.com/photo-1492691523567-61723c275df1?q=80&w=2070&auto=format&fit=crop" alt="Cinema 4">
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?q=80&w=2070&auto=format&fit=crop" alt="Cinema 5">
        </div>
    </div>

    <a href="index.html" class="back-btn">RETURN TO HOME</a>

</body>
</html>
