<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINEX | Amine OV Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; 
            background-color: #000;
        }

        /* تحسين الخلفية السينمائية */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2025&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            animation: fadeIn 2s ease-in; /* أنيميشن عند دخول الصفحة */
        }

        /* جعل النصوص متجاوبة مع الشاشات الصغيرة */
        .content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(40px, 10vw, 80px); /* يتغير الحجم حسب الشاشة */
            letter-spacing: clamp(5px, 2vw, 15px);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .content p {
            font-size: clamp(12px, 2vw, 18px);
            letter-spacing: 3px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .btn-enter {
            padding: 15px 40px;
            border: 1px solid white;
            background: transparent;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 14px;
        }

        .btn-enter:hover {
            background: white;
            color: black;
            letter-spacing: 4px; /* تأثير حركي عند التمرير */
        }

        /* ناف بار أنيق */
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo { 
            font-family: 'Playfair Display', serif; 
            font-weight: 900; 
            font-size: 24px; 
            letter-spacing: 2px;
        }

        .designer {
            font-size: 10px;
            letter-spacing: 3px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        /* أنيميشن الدخول */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.1); }
            to { opacity: 1; transform: scale(1); }
        }

        /* إخفاء السكرول بار في الموبايل */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ZINEX</div>
        <div class="designer">BY AMINE OV</div>
    </nav>

    <div class="hero">
        <div class="content">
            <p>DISCOVER THE ART OF</p>
            <h1>ZINEX</h1>
            <p style="margin-bottom: 40px;">CINEMATIC PHOTOGRAPHY & WEB DESIGN</p>
            <a href="login.html" class="btn-enter">ENTER EXPERIENCE</a>
        </div>
    </div>

</body>
</html>
