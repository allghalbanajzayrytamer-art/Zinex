<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINEX | Amine OV Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { height: 100%; font-family: 'Montserrat', sans-serif; overflow: hidden; }

        /* خلفية سينمائية */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2025&auto=format&fit=crop'); /* يمكنك تغيير الرابط بصورتك لاحقاً */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 80px;
            letter-spacing: 10px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .content p {
            font-size: 18px;
            letter-spacing: 3px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .btn-enter {
            padding: 15px 40px;
            border: 1px solid white;
            background: transparent;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.4s;
            letter-spacing: 2px;
        }

        .btn-enter:hover {
            background: white;
            color: black;
        }

        /* ناف بار بسيط */
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 24px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ZINEX</div>
        <div class="designer">BY AMINE OV</div>
    </nav>

    <div class="hero">
        <div class="content">
            <h1>ZINEX</h1>
            <p>CINEMATIC PHOTOGRAPHY & WEB DESIGN</p>
            <a href="login.html" class="btn-enter">ENTER EXPERIENCE</a>
        </div>
    </div>

</body>
</html>
