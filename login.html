<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINEX | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #0f172a; /* خلفية داكنة تناسب الستايل السينمائي */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            width: 800px;
            max-width: 100%;
            min-height: 500px;
        }

        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.6s ease-in-out;
        }

        /* تنسيق النموذج */
        form {
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 50px;
            height: 100%;
            text-align: center;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            color: #3140A8;
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 15px; }

        input {
            background-color: #f1f5f9;
            border: none;
            margin: 8px 0;
            padding: 12px 15px;
            font-size: 14px;
            border-radius: 8px;
            width: 100%;
            outline: none;
        }

        button {
            background-color: #3140A8;
            color: #fff;
            padding: 12px 45px;
            border: 1px solid transparent;
            border-radius: 10px;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); }
        button.hidden { background-color: transparent; border-color: #fff; }

        /* التحكم في التبديل */
        .sign-in { left: 0; width: 50%; z-index: 2; }
        .container.active .sign-in { transform: translateX(100%); }

        .sign-up { left: 0; width: 50%; opacity: 0; z-index: 1; }
        .container.active .sign-up {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
        }

        /* الجزء الأزرق المتحرك */
        .toggle-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: all 0.6s ease-in-out;
            z-index: 1000;
        }

        .container.active .toggle-container {
            transform: translateX(-100%);
            border-radius: 0 120px 120px 0;
        }

        .toggle {
            background: #3140A8;
            background: linear-gradient(to right, #1e293b, #3140A8);
            color: #fff;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: all 0.6s ease-in-out;
        }

        .container.active .toggle { transform: translateX(50%); }

        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 30px;
            text-align: center;
            top: 0;
            transition: all 0.6s ease-in-out;
        }

        .toggle-left { transform: translateX(-200%); }
        .container.active .toggle-left { transform: translateX(0); }

        .toggle-right { right: 0; transform: translateX(0); }
        .container.active .toggle-right { transform: translateX(200%); }

        .designer-tag {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            letter-spacing: 2px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-container sign-up">
            <form>
                <div class="brand-name">ZINEX</div>
                <h1>Create Account</h1>
                <input type="text" placeholder="Name">
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <button type="button">Sign Up</button>
            </form>
        </div>

        <div class="form-container sign-in">
            <form>
                <div class="brand-name">ZINEX</div>
                <h1>Sign In</h1>
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <a href="#" style="font-size: 12px; color: #666; margin-top: 10px;">Forgot Password?</a>
                <button type="button">Sign In</button>
            </form>
        </div>

        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1 style="color: white;">Welcome Back!</h1>
                    <p>To keep connected with ZINEX please login</p>
                    <button class="hidden" id="login">Sign In</button>
                    <div class="designer-tag">BY AMINE OV</div>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1 style="color: white;">Hello, Friend!</h1>
                    <p>Enter your details and start your journey with ZINEX</p>
                    <button class="hidden" id="register">Sign Up</button>
                    <div class="designer-tag">BY AMINE OV</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const registerBtn = document.getElementById('register');
        const loginBtn = document.getElementById('login');

        registerBtn.addEventListener('click', () => {
            container.classList.add("active");
        });

        loginBtn.addEventListener('click', () => {
            container.classList.remove("active");
        });
    </script>
</body>
</html>
